<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns:xlink="http://www.w3.org/1999/xlink" width="400.0" height="600.0" viewBox="0 0 400.0 600.0" xmlns="http://www.w3.org/2000/svg" version="1.1">
<style>
:root {
  --bg: #121212;
  --bg-mild: #282828;
  --text: #e0e0e0;
  --text-accent-strong: #b9e0e1;
  --text-accent: #93e0e3;
  --text-dim: #63898b;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --bg-mild: #eee;
    --text: #333333;
    --text-accent-strong: #76898a;
    --text-accent: #63898b;
    --text-dim: #999;
  }
}
svg {
  background-color: var(--bg);
}
text {
  fill: var(--text);
  font-family: monospace;
}

line.tick, line.identity-line {
  stroke: var(--bg-mild);
}
line.axis-border {
  stroke: var(--text-accent);
}
text.tick-x {
  text-anchor: middle;
  dominant-baseline: hanging;
}
text.tick-y {
  text-anchor: end;
  dominant-baseline: central;
}

rect.boxplot {
  fill: var(--text-dim);
  stroke-width: 0;
}
line.boxplot-median {
  stroke: var(--text-accent);
}
line.boxplot-whisker {
  stroke: var(--text-accent);
}

</style>
<line x1="50.0" y1="300.0" x2="400.0" y2="300.0" class='tick tick-y'/>
<line x1="43.0" y1="300.0" x2="50.0" y2="300.0"/>
<text x='36.0' y='300.0' class='tick tick-y'>0</text>
<line x1="50.0" y1="155.0" x2="400.0" y2="155.0" class='tick tick-y'/>
<line x1="43.0" y1="155.0" x2="50.0" y2="155.0"/>
<text x='36.0' y='155.0' class='tick tick-y'>1</text>
<line x1="50.0" y1="10.0" x2="400.0" y2="10.0" class='tick tick-y'/>
<line x1="43.0" y1="10.0" x2="50.0" y2="10.0"/>
<text x='36.0' y='10.0' class='tick tick-y'>2</text>
<line x1="50.0" y1="445.0" x2="400.0" y2="445.0" class='tick tick-y'/>
<line x1="43.0" y1="445.0" x2="50.0" y2="445.0"/>
<text x='36.0' y='445.0' class='tick tick-y'>-1</text>
<line x1="50.0" y1="590.0" x2="400.0" y2="590.0" class='tick tick-y'/>
<line x1="43.0" y1="590.0" x2="50.0" y2="590.0"/>
<text x='36.0' y='590.0' class='tick tick-y'>-2</text>
<line x1="50.0" y1="590.0" x2="50.0" y2="10.0" class='axis-border axis-border-y'/>
<line x1="50.0" y1="590.0" x2="400.0" y2="590.0" class='axis-border axis-border-x'/>
<text x='15.0' y='300.0' class='label-y' transform='rotate(-90 15,300.0)'>ln(actual / estimate)</text>
<line x1="166.7" y1="474.6" x2="166.7" y2="72.6" class='boxplot-whisker boxplot-whisker-span'/>
<line x1="125.8" y1="474.6" x2="207.5" y2="474.6" class='boxplot-whisker boxplot-whisker-end'/>
<line x1="125.8" y1="72.6" x2="207.5" y2="72.6" class='boxplot-whisker boxplot-whisker-end'/>
<rect x="125.8" y="196.9" width="81.7" height="122.6" class='boxplot'/>
<line x1="125.8" y1="238.0" x2="207.5" y2="238.0" class='boxplot-median'/>
<text x='166.7' y='570.0' class='boxplot-label'>ai</text>
<line x1="283.3" y1="432.9" x2="283.3" y2="81.9" class='boxplot-whisker boxplot-whisker-span'/>
<line x1="242.5" y1="432.9" x2="324.2" y2="432.9" class='boxplot-whisker boxplot-whisker-end'/>
<line x1="242.5" y1="81.9" x2="324.2" y2="81.9" class='boxplot-whisker boxplot-whisker-end'/>
<rect x="242.5" y="199.5" width="81.7" height="142.2" class='boxplot'/>
<line x1="242.5" y1="320.7" x2="324.2" y2="320.7" class='boxplot-median'/>
<text x='283.3' y='570.0' class='boxplot-label'>human</text>
</svg>
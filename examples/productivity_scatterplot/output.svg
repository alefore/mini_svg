<svg xmlns:xlink="http://www.w3.org/1999/xlink" width="800.0" height="600.0" viewBox="0 0 800.0 600.0" xmlns="http://www.w3.org/2000/svg" version="1.1">
<style>
:root {
  --bg: #121212;
  --bg-mild: #282828;
  --text: #e0e0e0;
  --text-accent-strong: #b9e0e1;
  --text-accent: #93e0e3;
  --text-dim: #63898b;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --bg-mild: #eee;
    --text: #333333;
    --text-accent-strong: #76898a;
    --text-accent: #63898b;
    --text-dim: #999;
  }
}
svg {
  background-color: var(--bg);
}
text {
  fill: var(--text);
  font-family: monospace;
}

line.tick, line.identity-line {
  stroke: var(--bg-mild);
}
line.axis-border {
  stroke: var(--text-accent);
}
text.tick-x {
  text-anchor: middle;
  dominant-baseline: hanging;
}
text.tick-y {
  text-anchor: end;
  dominant-baseline: central;
}

circle.ai, rect.labels-ai {
  fill: rgba(173, 216, 230, 0.7);
  stroke-width: 0;
}
circle.human, rect.labels-human {
  fill: rgba(255, 182, 193, 0.7);
  stroke-width: 0;
}

</style>

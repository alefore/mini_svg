<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns:xlink="http://www.w3.org/1999/xlink" width="300.0" height="400.0" viewBox="0 0 300.0 400.0" xmlns="http://www.w3.org/2000/svg" version="1.1">
<style>
:root {
  --bg: #121212;
  --bg-mild: #282828;
  --text: #e0e0e0;
  --text-accent-strong: #b9e0e1;
  --text-accent: #93e0e3;
  --text-dim: #63898b;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --bg-mild: #eee;
    --text: #333333;
    --text-accent-strong: #76898a;
    --text-accent: #63898b;
    --text-dim: #999;
  }
}
svg {
  background-color: var(--bg);
}
text {
  fill: var(--text);
  font-family: monospace;
}
polygon, path, circle {
  stroke: var(--text);
  fill: var(--bg-mild);
}
line {
  stroke: var(--text-accent);
}
line.tic {
  stroke: var(--bg-mild);
}
.ai, .labels-ai {
  fill: rgba(173, 216, 230, 0.7);
  stroke-width: 0;
}
.human, .labels-human {
  fill: rgba(255, 182, 193, 0.7);
  stroke-width: 0;
}
.monkey, .labels-monkey {
  fill: rgba(216, 230, 173, 0.7);
  stroke-width: 0;
}
rect.ai {
  stroke: var(--text-dim);
  stroke-width: 0.5;
}
rect.human {
  stroke: var(--text-dim);
  stroke-width: 0.5;
}
rect.monkey {
  stroke: var(--text-dim);
  stroke-width: 0.5;
}
text.tic-value-x, text.tic-value-y {
  fill: var(--text-dim);
  font-family: monospace;
}
text.tic-value-x {
  text-anchor: middle;
  dominant-baseline: hanging;
}
text.tic-value-y {
  text-anchor: end;
  dominant-baseline: central;
}
text.label-x, text.label-y {
  text-anchor: middle;
}
text.boxplot-label {
  text-anchor: middle;
  dominant-baseline: hanging;
}
text.label-x {
  transform: rotate(-90 15,200);
}
rect.boxplot {
  fill: var(--text-dim);
}

</style>
<line x1="50.0" y1="390.0" x2="300.0" y2="390.0" class='tic'/>
<line x1="45.0" y1="390.0" x2="50.0" y2="390.0"/>
<text x='40.0' y='390.0' class='tic-value-y'>0</text>
<line x1="50.0" y1="295.0" x2="300.0" y2="295.0" class='tic'/>
<line x1="45.0" y1="295.0" x2="50.0" y2="295.0"/>
<text x='40.0' y='295.0' class='tic-value-y'>5</text>
<line x1="50.0" y1="200.0" x2="300.0" y2="200.0" class='tic'/>
<line x1="45.0" y1="200.0" x2="50.0" y2="200.0"/>
<text x='40.0' y='200.0' class='tic-value-y'>10</text>
<line x1="50.0" y1="105.0" x2="300.0" y2="105.0" class='tic'/>
<line x1="45.0" y1="105.0" x2="50.0" y2="105.0"/>
<text x='40.0' y='105.0' class='tic-value-y'>15</text>
<line x1="50.0" y1="10.0" x2="300.0" y2="10.0" class='tic'/>
<line x1="45.0" y1="10.0" x2="50.0" y2="10.0"/>
<text x='40.0' y='10.0' class='tic-value-y'>20</text>
<line x1="50.0" y1="390.0" x2="50.0" y2="10.0"/>
<line x1="50.0" y1="390.0" x2="300.0" y2="390.0"/>
<text x='15.0' y='200.0' class='label-y' transform='rotate(-90 15,200.0)'>ln(actual / estimate)</text>
<line x1="112.5" y1="219.0" x2="112.5" y2="29.0"/>
<line x1="90.6" y1="219.0" x2="134.4" y2="219.0"/>
<line x1="90.6" y1="29.0" x2="134.4" y2="29.0"/>
<rect x="90.6" y="119.2" width="43.8" height="80.8" class='boxplot'/>
<line x1="90.6" y1="181.0" x2="134.4" y2="181.0" class='boxplot-median'/>
<text x='112.5' y='370.0' class='boxplot-label'>ai</text>
<line x1="175.0" y1="162.0" x2="175.0" y2="48.0"/>
<line x1="153.1" y1="162.0" x2="196.9" y2="162.0"/>
<line x1="153.1" y1="48.0" x2="196.9" y2="48.0"/>
<rect x="153.1" y="90.8" width="43.8" height="71.2" class='boxplot'/>
<line x1="153.1" y1="133.5" x2="196.9" y2="133.5" class='boxplot-median'/>
<text x='175.0' y='370.0' class='boxplot-label'>human</text>
<line x1="237.5" y1="333.0" x2="237.5" y2="162.0"/>
<line x1="215.6" y1="333.0" x2="259.4" y2="333.0"/>
<line x1="215.6" y1="162.0" x2="259.4" y2="162.0"/>
<rect x="215.6" y="204.8" width="43.8" height="99.8" class='boxplot'/>
<line x1="215.6" y1="257.0" x2="259.4" y2="257.0" class='boxplot-median'/>
<text x='237.5' y='370.0' class='boxplot-label'>monkey</text>
</svg>
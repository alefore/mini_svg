<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN"
  "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns:xlink="http://www.w3.org/1999/xlink" width="800.0" height="600.0" viewBox="0 0 800.0 600.0" xmlns="http://www.w3.org/2000/svg" version="1.1">
<style>
:root {
  --bg: #121212;
  --bg-mild: #282828;
  --text: #e0e0e0;
  --text-accent-strong: #b9e0e1;
  --text-accent: #93e0e3;
  --text-dim: #63898b;
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --bg-mild: #eee;
    --text: #333333;
    --text-accent-strong: #76898a;
    --text-accent: #63898b;
    --text-dim: #999;
  }
}
svg {
  background-color: var(--bg);
}
text {
  fill: var(--text);
  font-family: monospace;
}
polygon, path, circle {
  stroke: var(--text);
  fill: var(--bg-mild);
}
line {
  stroke: var(--text-accent);
}
line.tic {
  stroke: var(--bg-mild);
}
.ai, .labels-ai {
  fill: rgba(173, 216, 230, 0.7);
  stroke-width: 0;
}
.human, .labels-human {
  fill: rgba(255, 182, 193, 0.7);
  stroke-width: 0;
}
.monkey, .labels-monkey {
  fill: rgba(216, 230, 173, 0.7);
  stroke-width: 0;
}
rect.ai {
  stroke: var(--text-dim);
  stroke-width: 0.5;
}
rect.human {
  stroke: var(--text-dim);
  stroke-width: 0.5;
}
rect.monkey {
  stroke: var(--text-dim);
  stroke-width: 0.5;
}
text.tic-value-x, text.tic-value-y {
  fill: var(--text-dim);
  font-family: monospace;
}
text.tic-value-x {
  text-anchor: middle;
  dominant-baseline: hanging;
}
text.tic-value-y {
  text-anchor: end;
  dominant-baseline: central;
}
text.label-x, text.label-y {
  text-anchor: middle;
}
text.boxplot-label {
  text-anchor: middle;
  dominant-baseline: hanging;
}
text.label-x {
  transform: rotate(-90 15,200);
}
rect.boxplot {
  fill: var(--text-dim);
}

:root {
  --color-7d: #f4cae4;
  --color-30d: #b3e2cd;
  --color-90d: #fdcdac;
  --color-365d: #cbd5e8;

path {
  fill: none;
  stroke-width: 1;
}
path.lineplot-7d { stroke: var(--color-7d); }
path.lineplot-30d { stroke: var(--color-30d); }
path.lineplot-90d { stroke: var(--color-90d); }
path.lineplot-365d {
  stroke: var(--color-365d);
  stroke-width: 3;
}
rect.labels-7d { fill: var(--color-7d); }
rect.labels-30d { fill: var(--color-30d); }
rect.labels-90d { fill: var(--color-90d); }
rect.labels-365d { fill: var(--color-365d); }

</style>
